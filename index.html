<html>
  <head>
    <style>
      /* Add CSS styling */
      body {
        background-color: red;
        color: black;
        font-size: 18px;
        font-family: Arial;
      }

      #response {
        padding: 20px;
        background-color: black;
        color: white;
        border-radius: 10px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <h1>My Chatbot</h1>
    <!-- Input field to type a question -->
    <input type="text" id="question">
    <button id="submit">Submit</button>
    <!-- Placeholder to display the response -->
    <div id="response"></div>

    <script>
      // Add JavaScript to handle user inputs and display the response
      const submitButton = document.getElementById("submit");
      const questionInput = document.getElementById("question");
      const responseDiv = document.getElementById("response");

      submitButton.addEventListener("click", () => {
        // Get the user's question from the input field
        const userQuestion = questionInput.value;

        // Call the Dialogflow API to get the response
        fetch("https://api.dialogflow.com/v1/query?v=20150910", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer YOUR_ACCESS_TOKEN"
          },
          body: JSON.stringify({
            query: userQuestion,
            lang: "en",
            sessionId: "123456789"
          })
        })
        .then(response => response.json())
        .then(data => {
          // Display the response in the placeholder
          responseDiv.innerHTML = data.result.fulfillment.speech;
        })
        .catch(error => {
          console.error("Error fetching the response from Dialogflow", error);
        });
      });
    </script>
  </body>
</html>
